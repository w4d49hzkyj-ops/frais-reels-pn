<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B1220">
<title>Frais Réels PN</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>✈️</text></svg>">
<style>
  html,body{margin:0;padding:0;background:#0B1220;}
  #root{min-height:100vh;}
  *{-webkit-tap-highlight-color:transparent;}
  input,select,textarea{font-family:inherit;}
  #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;color:#6B85A8;font-family:-apple-system,sans-serif;padding:24px;text-align:center;}
  #boot .spin{width:36px;height:36px;border:3px solid #1F3455;border-top-color:#D4A017;
    border-radius:50%;animation:s 0.8s linear infinite;margin-bottom:16px;}
  @keyframes s{to{transform:rotate(360deg)}}
  #err{display:none;position:fixed;inset:0;background:#0B1220;color:#F0F4FA;
    font-family:-apple-system,sans-serif;padding:24px;overflow:auto;box-sizing:border-box;z-index:9999;}
  #err h2{color:#EF4444;font-size:16px;}
  #err pre{background:#131D2E;border:1px solid #1F3455;border-radius:8px;padding:12px;
    font-size:11px;white-space:pre-wrap;color:#F59E0B;}
  #err button{background:#D4A017;color:#000;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;margin-top:12px;}
</style>
</head>
<body>
<div id="root"></div>
<div id="boot"><div class="spin"></div><div>Chargement…</div></div>
<div id="err"><h2>⚠️ Erreur</h2><pre id="errmsg"></pre><button onclick="location.reload()">Recharger</button></div>
<script>
window.__showErr=function(m){var b=document.getElementById("boot");if(b)b.style.display="none";
  document.getElementById("err").style.display="block";document.getElementById("errmsg").textContent=String(m);};
window.addEventListener("error",function(e){window.__showErr((e.message||"erreur")+(e.lineno?(" L"+e.lineno):""));});
window.addEventListener("unhandledrejection",function(e){window.__showErr("Promesse: "+(e.reason&&e.reason.message||e.reason));});
window.storage={
  get:async(k)=>{var v=localStorage.getItem("fr-pnt:"+k);if(v===null)throw new Error("nf");return{key:k,value:v};},
  set:async(k,v)=>{localStorage.setItem("fr-pnt:"+k,v);return{key:k,value:v};},
  delete:async(k)=>{localStorage.removeItem("fr-pnt:"+k);return{key:k,deleted:true};},
};
</script>
