<script>
// Affiche toute erreur à l'écran au lieu d'un écran noir
window.__showErr = function(msg){
  document.getElementById("boot").style.display="none";
  document.getElementById("err").style.display="block";
  document.getElementById("errmsg").textContent = String(msg);
};
window.addEventListener("error", function(e){
  window.__showErr((e.message||"erreur")+"\n"+(e.filename||"")+":"+(e.lineno||""));
});
window.addEventListener("unhandledrejection", function(e){
  window.__showErr("Promesse rejetée : "+(e.reason&&e.reason.message||e.reason));
});
// Recharge si on touche l'écran de boot (au cas où Babel traîne)
document.getElementById("boot").addEventListener("click", function(){ location.reload(); });

// ─── SHIM STOCKAGE (localStorage) ───
window.storage = {
  get: async (key) => { const v = localStorage.getItem("fr-pnt:"+key);
    if (v === null) throw new Error("not found"); return { key, value: v }; },
  set: async (key, value) => { localStorage.setItem("fr-pnt:"+key, value); return { key, value }; },
  delete: async (key) => { localStorage.removeItem("fr-pnt:"+key); return { key, deleted: true }; },
};

// Chargement séquentiel des librairies avec source de secours
function loadScript(urls){
  return new Promise(function(resolve, reject){
    var i = 0;
    function tryNext(){
      if (i >= urls.length){ reject(new Error("Impossible de charger : "+urls[0])); return; }
      var s = document.createElement("script");
      s.src = urls[i];
      s.onload = function(){ resolve(); };
      s.onerror = function(){ i++; tryNext(); };
      document.head.appendChild(s);
    }
    tryNext();
  });
}

  try {
    await loadScript([
      "https://unpkg.com/react@18/umd/react.production.min.js",

      "https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"
    ]);

      "https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js",
      "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"
    ]);
    await loadScript([
      "https://unpkg.com/@babel/standalone/babel.min.js",
      "https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js",
      "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"
    ]);
    // Transpiler et exécuter le code JSX
    var code = document.getElementById("app-code").textContent;
    var out = Babel.transform(code, { presets: ["react"] }).code;
    new Function(out)();
    document.getElementById("boot").style.display = "none";
  } catch(e){
    window.__showErr("Chargement : "+(e.message||e));
  }
})();

// ─── PARSEUR PDF NATIF JS ────────────────────────────────────────
// Extrait les tokens texte d'un PDF en lisant les streams zlib directement
// Fonctionne sur les PDFs APM/JasperReports sans aucune librairie externe

function inflateWith(format, bytes) {
  // format "deflate" = zlib avec header | "deflate-raw" = sans header
  return new Promise((resolve, reject) => {
    try {
      const ds = new DecompressionStream(format);
      const writer = ds.writable.getWriter();
      const reader = ds.readable.getReader();
      const chunks = [];
      reader.read().then(function pump({ done, value }) {
        if (done) {
          const total = chunks.reduce((s, c) => s + c.length, 0);
          const out = new Uint8Array(total);
          let off = 0;
          for (const c of chunks) { out.set(c, off); off += c.length; }
          resolve(out);
          return;
        }
        chunks.push(value);
        reader.read().then(pump).catch(reject);
      }).catch(reject);
      writer.write(bytes);
      writer.close();
    } catch (e) { reject(e); }
  });
}

async function inflatePDF(compressedBytes) {
  // "deflate" attend le header zlib COMPLET (78 9c…) — ne pas le couper !
  try {
    return await inflateWith("deflate", compressedBytes);
  } catch (e) {
    // Fallback : raw deflate sans les 2 octets de header zlib
    return await inflateWith("deflate-raw", compressedBytes.slice(2));
  }
}

async function extractPDFTokens(arrayBuffer) {
  const bytes = new Uint8Array(arrayBuffer);
  const decoder = new TextDecoder("latin1");
  const full = decoder.decode(bytes);

  // Trouver tous les streams du PDF
  const tokens = [];
  const streamRegex = /stream\r?\n([\s\S]*?)\r?\nendstream/g;
  let match;

  while ((match = streamRegex.exec(full)) !== null) {
    // Position des bytes du stream dans le buffer (latin1 = 1 char ↔ 1 byte)
    const start = match.index + match[0].indexOf("\n") + 1;
    const streamBytes = bytes.slice(start, start + match[1].length);

    let content = "";
    if (streamBytes[0] === 0x78) {
      // Header zlib (78 9c / 78 da…) → décompresser
      try {
        const inflated = await inflatePDF(streamBytes);
        content = new TextDecoder("latin1").decode(inflated);
      } catch (e) {
        continue; // stream illisible → ignorer
      }
    } else if (streamBytes[0] === 0xff && streamBytes[1] === 0xd8) {
      continue; // image JPEG → ignorer
    } else {
      content = match[1]; // stream non compressé
    }

    // Extraire les tokens entre parenthèses (opérateurs Tj du PDF)
    const paren = /\(([^)\\]|\\.)*\)/g;
    let pm;
    while ((pm = paren.exec(content)) !== null) {
      const raw = pm[0].slice(1, -1)
        .replace(/\\n/g,"\n").replace(/\\r/g,"\r")
        .replace(/\\t/g,"\t").replace(/\\\(/g,"(")
        .replace(/\\\)/g,")").replace(/\\\\/g,"\\");
      const t = raw.trim();
      if (t) tokens.push(t);
    }
  }
  return tokens;
}

function parseAPMFromTokens(tokens) {
  // Identifier le header
  let pilote = "", periode = "", base = "";
  for (let i = 0; i < Math.min(tokens.length, 20); i++) {
    // Nom du pilote : token contenant le matricule (CDB/xxx ou OPL/xxx)
    if (/\((CDB|OPL|CPT|FO)\//i.test(tokens[i])) {
      pilote = tokens[i].replace(/\\/g, "").replace(/\($/, "").trim();
    }
    if (/^(Janvier|Février|Mars|Avril|Mai|Juin|Juillet|Août|Septembre|Octobre|Novembre|Décembre)\s+\d{4}$/i.test(tokens[i])) {
      periode = tokens[i];
    }
    if (/^April \d{4}$/.test(tokens[i]) || /^\w+ \d{4}$/.test(tokens[i])) {
      if (!periode) periode = tokens[i];
    }
  }

  // Parser les lignes jour par jour.
  // Règle : un token ^\d{2}$ (01–31) est un numéro de jour SI le token
  // suivant contient des lettres (= une affectation) et n'est pas une heure.
  // Cela élimine les valeurs numériques des colonnes (HCa, PV…) qui
  // ressemblent à des numéros de jour, et les jours vides.
  // Dédoublonnage par jour : la page 2 (relevé HC) répète les mêmes jours.
  const dayMap = new Map();
  let i = 0;
  while (i < tokens.length) {
    const t = tokens[i];
    if (/^\d{2}$/.test(t)) {
      const jour = parseInt(t, 10);
      if (jour >= 1 && jour <= 31 && i + 1 < tokens.length) {
        const nxt = tokens[i + 1];
        const isAffectation =
          /[A-Za-zÀ-ÿ]/.test(nxt) && !/^\d{2}:\d{2}$/.test(nxt);
        if (isAffectation) {
          if (!dayMap.has(jour)) dayMap.set(jour, nxt);
          i += 2;
          continue;
        }
      }
    }
    i++;
  }
  const days = [...dayMap.entries()]
    .map(([jour, affectation]) => ({ jour, affectation }))
    .sort((a, b) => a.jour - b.jour);

  // Détecter la base (premier code IATA dans les affectations de positionnement)
  const firstFlight = days.find(d => /[A-Z]{3}[-*][A-Z]{3}/.test(d.affectation));
  if (firstFlight) {
    const codes = firstFlight.affectation.match(/[A-Z]{3}/g) || [];
    base = codes[0] || "";
  }

  // Filtrer les jours de vol éligibles DLF
  const NON_ELIGIBLE = ["OFF","CONGE","CONGÉ","BLANC","STAGE","REPOS",
    "RESERVE","RÉSERVE","STANDBY","VISITE","SIMULATEUR","DESIDERATA"];
  const flightDays = days.filter(d => {
    const u = d.affectation.toUpperCase();
    if (NON_ELIGIBLE.some(k => u.includes(k))) return false;
    return /[A-Z]{3}[-*][A-Z]{3}/.test(d.affectation);
  });

  // Grouper en rotations (jours consécutifs)
  if (flightDays.length === 0) return { pilote, periode, base, rotations: [] };

  const groups = [];
  let cur = [flightDays[0]];
  for (let j = 1; j < flightDays.length; j++) {
    if (flightDays[j].jour === flightDays[j-1].jour + 1) {
      cur.push(flightDays[j]);
    } else {
      groups.push(cur);
      cur = [flightDays[j]];
    }
  }
  groups.push(cur);

  // Calculer chaque rotation — méthode des découchers (exemples 2.1.4 du mémento) :
  // · Le taux de chaque indemnité = celui du PAYS DU DÉCOUCHER (lieu de la nuitée),
  //   pas un taux unique. Zone euro = 177 € (moyenne), mais une nuit à Copenhague
  //   = tarif Danemark, à Londres = tarif GB, à Marrakech = tarif Maroc… (ex. n°5-7)
  // · Cas 1 : (X − 0,5) indemnités, la fraction 0,5 s'affecte à la DERNIÈRE nuitée.
  // · Cas 2 (découcher dans un pays hors liste 1a = arrêt ≥7h de facto) :
  //   X indemnités, le dernier jour compte 1,0 au taux du dernier découcher (ex. n°9-15).
  // · Aller-retour journée (1 jour) : 0,5 indemnité au tarif zone euro (base).
  const ZONE_EURO_RATE = 177;
  const rotations = groups.map((g, idx) => {
    const allCodes = [...new Set(g.flatMap(d => (d.affectation.match(/[A-Z]{3}/g)||[])))];
    const jours = g[g.length-1].jour - g[0].jour + 1;
    const pays = [...new Set(allCodes.map(c => IATA[c]?.[1]).filter(Boolean))];
    const uniq = allCodes.filter((c, i, a) => a.indexOf(c) === i);

    // Découcher de chaque jour = dernier code IATA de l'affectation du jour
    // (sauf le dernier jour de la rotation : retour à la base, pas de nuitée)
    const nuits = [];
    for (let d = 0; d < g.length - 1; d++) {
      const codes = g[d].affectation.match(/[A-Z]{3}/g) || [];
      const code = codes[codes.length - 1];
      const info = IATA[code];
      nuits.push({
        jour: g[d].jour,
        code,
        pays: info ? info[1] : code,
        zone1a: info ? info[2] : true,      // dans la liste 1a → Cas 1 possible
        // Taux du pays de découcher ; zone euro (devise €) = taux moyen 177
        taux: info ? info[3] : ZONE_EURO_RATE,
      });
    }

    // Cas 2 si au moins un découcher dans un pays hors liste 1a
    // (une nuitée implique un arrêt ≥7h dans ce pays)
    const isCas2 = nuits.some(n => !n.zone1a);
    const horsZone = [...new Set(nuits.filter(n => !n.zone1a).map(n => n.pays))];

    // ── NUITÉES EMPLOYEUR à réintégrer (tarif Transavia 2025) ──
    // Chaque nuit de découcher HORS BASE = une chambre payée par l'employeur.
    // ORY (base) ne génère JAMAIS de nuitée. Escale absente du barème → 0 + alerte.
    let nuiteesMontant = 0;
    const nuiteesDetail = [];
    const nuiteesInconnues = [];
    for (const n of nuits) {
      if (n.code === "ORY" || n.code === base) continue; // base : dodo à la maison
      const tarif = NUITEES_TARIF[n.code];
      if (tarif !== undefined) {
        nuiteesMontant += tarif;
        nuiteesDetail.push({ jour: n.jour, code: n.code, tarif });
      } else {
        nuiteesInconnues.push(n.code);
        nuiteesDetail.push({ jour: n.jour, code: n.code, tarif: 0, inconnu: true });
      }
    }

    // Montant = Σ taux des nuitées, la dernière comptant 0,5 (Cas 1) ou 1,0 (Cas 2)
    let montant = 0, nbI = 0;
    const detailNuits = [];
    if (nuits.length === 0) {
      // Aller-retour journée : 0,5 indemnité au tarif base / zone euro
      montant = 0.5 * ZONE_EURO_RATE;
      nbI = 0.5;
      detailNuits.push({ libelle:"A/R journée (base)", coef:0.5, taux:ZONE_EURO_RATE });
    } else {
      for (let n = 0; n < nuits.length; n++) {
        const last = n === nuits.length - 1;
        // En Cas 1 le dernier jour (sans nuitée) vaut 0,5 affecté à la dernière
        // nuitée → cette nuitée compte 1 + 0,5 = 1,5… non : X jours, X−1 nuits,
        // total (X−0,5) ⇒ chaque nuit = 1 sauf ajout de 0,5 pour le dernier jour.
        const coef = last ? (isCas2 ? 2 : 1.5) : 1;
        montant += coef * nuits[n].taux;
        nbI += coef;
        detailNuits.push({ libelle:`Nuit J${nuits[n].jour} ${nuits[n].pays}`, coef, taux:nuits[n].taux });
      }
    }

    // Taux affiché = celui qui domine (le plus fréquent parmi les nuitées)
    const tauxFreq = {};
    nuits.forEach(n => { tauxFreq[n.taux] = (tauxFreq[n.taux]||0) + 1; });
    const tauxDominant = nuits.length
      ? parseInt(Object.entries(tauxFreq).sort((a,b)=>b[1]-a[1])[0][0])
      : ZONE_EURO_RATE;
    const paysDominant = nuits.length
      ? nuits.find(n => n.taux === tauxDominant)?.pays
      : "Zone Euro";

    return {
      id: idx,
      premier_jour: g[0].jour,
      dernier_jour: g[g.length-1].jour,
      jours_engagement: jours,
      affectations: g.map(d => d.affectation),
      jours: g.map(d => d.jour),
      trajet_resume: uniq.join(" → "),
      codes_iata: allCodes,
      pays_visites: pays,
      nuits: detailNuits,
      nuiteesMontant,
      nuiteesDetail,
      nuiteesInconnues,
      hors_zone_euro: horsZone,
      cas: isCas2 ? 2 : 1,
      isCas2,
      taux: tauxDominant,
      nb_indemnites: nbI,
      montant,
      pays_taux: paysDominant,
    };
  });

  return { pilote, periode, base, rotations };
}

// ─── LECTURE FICHIER ─────────────────────────────────────────────
async function readFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = () => reject(new Error("Impossible de lire le fichier"));
    reader.readAsArrayBuffer(file);
  });
}

function computeCat(cat, vals) {
  if (cat.compute) return cat.compute(vals);
  // reint = vraie soustraction des frais (ex: tickets resto, remboursements mandat)
  // reintSalaire = à AJOUTER au salaire 1AJ, n'ampute PAS les frais (méthode mémento §1.8.2)
  return cat.fields.reduce((s,f)=>{
    if (f.reintSalaire) return s;
    return s + (f.reint ? -(parseFloat(vals[f.id])||0) : (parseFloat(vals[f.id])||0));
  },0);
}

function computeReintSalaire(cat, vals) {
  return cat.fields.reduce((s,f)=>
    s + (f.reintSalaire ? (parseFloat(vals[f.id])||0) : 0), 0);
}

// ─── MODULE FRAIS EN COURRIER (APM) ──────────────────────────────
function CourrierModule({ rotations, setRotations, nuitees, setNuitees, meta, setMeta, periodes, setPeriodes }) {
  const [logs, setLogs] = useState([]);
  const [busy, setBusy] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef();
  const log = useCallback((type,msg)=>setLogs(l=>[...l,{type,msg}]),[]);

  const processFile = useCallback(async (file) => {
    if (!file) return;
    setBusy(true); setLogs([]);
    log("info",`📂 "${file.name}" (${Math.round(file.size/1024)} ko)…`);
    try {
      const buffer = await readFile(file);
      log("info","📖 Extraction du texte PDF…");
      const tokens = await extractPDFTokens(buffer);
      log("info",`   → ${tokens.length} tokens extraits`);
      if (tokens.length < 10) throw new Error("PDF vide ou protégé.");
      const result = parseAPMFromTokens(tokens);
      if (result.rotations.length === 0) {
        log("warn","⚠️ Aucune rotation trouvée. Vérifiez le format APM (PV ou HC).");
      } else {
        // Anti-doublon : un même mois ne doit pas être chargé deux fois
        const per = result.periode || file.name;
        if (periodes.includes(per)) {
          log("warn",`⚠️ "${per}" déjà chargé — fichier ignoré pour éviter un doublon.`);
          log("info","   (Utilisez 🗑 Réinitialiser pour repartir de zéro si besoin.)");
          setBusy(false);
          return;
        }
        setPeriodes(prev=>[...prev, per]);
        // Marquer chaque rotation avec son mois d'origine
        result.rotations = result.rotations.map(r=>({...r, periode: per}));
        log("success",`✅ ${result.rotations.length} rotation(s) — ${per}`);
        result.rotations.forEach(r=>log("success",
          `   J${r.premier_jour}→${r.dernier_jour} : Cas ${r.cas} · ${r.nb_indemnites} ind. × ${r.taux}€ = ${fmt(r.montant)}`));
      }
      if (result.pilote||result.periode) setMeta({pilote:result.pilote,base:result.base,periode:result.periode});
      setRotations(prev=>[...prev,...result.rotations]);
    } catch(e) {
      log("error",`❌ ${e.message}`);
    } finally { setBusy(false); }
  },[log,setRotations,setMeta,periodes,setPeriodes]);

  const toggleCas = idx => setRotations(p=>p.map((r,i)=>{
    if(i!==idx) return r;
    const c2 = !(r.cas===2||r.isCas2);
    // Recalcul depuis le détail des nuitées : seul le coefficient de la
    // dernière nuitée change (1,5 en Cas 1 ↔ 2,0 en Cas 2)
    if (!r.nuits || r.nuits.length===0) return r; // A/R journée : pas de bascule
    const nuits = r.nuits.map((n,k)=>{
      const last = k === r.nuits.length-1;
      return {...n, coef: last ? (c2?2:1.5) : n.coef};
    });
    const montant = nuits.reduce((s,n)=>s+n.coef*n.taux,0);
    const nbI = nuits.reduce((s,n)=>s+n.coef,0);
    return {...r, cas:c2?2:1, isCas2:c2, nuits, nb_indemnites:nbI, montant};
  }));

  const totalCourrier = rotations.reduce((s,r)=>s+r.montant,0);

  return (
    <div>
      {/* Jauge des 12 mois */}
      <div style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.muted,marginBottom:4}}>
          <span>📆 Relevés chargés : {periodes.length} / 12 mois</span>
          {periodes.length>=12 && <span style={{color:C.green,fontWeight:700}}>✓ Année complète</span>}
        </div>
        <div style={{display:"flex",gap:3}}>
          {Array.from({length:12}).map((_,i)=>(
            <div key={i} style={{
              flex:1, height:6, borderRadius:3,
              background: i<periodes.length ? C.green : C.border,
              transition:"background 0.3s",
            }}/>
          ))}
        </div>
        {periodes.length>0 && (
          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
            {periodes.map((p,i)=>(
              <span key={i} style={{
                fontSize:9, background:`${C.green}18`, color:C.green,
                border:`1px solid ${C.green}33`, borderRadius:4, padding:"1px 6px",
              }}>{p}</span>
            ))}
          </div>
        )}
      </div>

      {/* Drop zone */}
      <div
        onDragOver={e=>{e.preventDefault();setDragOver(true)}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);processFile(e.dataTransfer.files[0])}}
        onClick={()=>fileRef.current?.click()}
        style={{
          border:`2px dashed ${dragOver?C.gold:C.border}`,
          borderRadius:12, padding:"20px 16px", textAlign:"center",
          cursor:"pointer", background:dragOver?`${C.gold}08`:C.alt,
          transition:"all 0.2s", marginBottom:12,
        }}
      >
        <input ref={fileRef} type="file" accept=".pdf" onChange={e=>processFile(e.target.files[0])} style={{display:"none"}}/>
        {busy ? (
          <><div style={{fontSize:26,marginBottom:6}}>⏳</div>
          <div style={{color:C.white,fontWeight:600,fontSize:13}}>Lecture du relevé…</div></>
        ) : (
          <><div style={{fontSize:28,marginBottom:6}}>📄</div>
          <div style={{color:C.white,fontWeight:600,fontSize:13}}>Déposez votre relevé APM mensuel</div>
          <div style={{color:C.muted,fontSize:10,marginTop:3}}>PV ou HC · cumulables sur l'année</div>
          <div style={{display:"inline-block",marginTop:10,background:C.gold,color:"#000",
            borderRadius:7,padding:"7px 18px",fontSize:11,fontWeight:700}}>Choisir un PDF</div></>
        )}
      </div>

      {logs.length>0 && (
        <div style={{background:C.bg,borderRadius:8,padding:10,marginBottom:12,fontFamily:"monospace"}}>
          {logs.map((l,i)=>(
            <div key={i} style={{fontSize:10,padding:"2px 0",lineHeight:1.5,
              color:l.type==="success"?C.green:l.type==="error"?C.red:l.type==="warn"?C.amber:C.muted}}>
              {l.msg}
            </div>
          ))}
        </div>
      )}

      {meta && (meta.pilote||meta.periode) && (
        <div style={{display:"flex",gap:14,fontSize:11,marginBottom:10,flexWrap:"wrap"}}>
          {meta.pilote && <span style={{color:C.muted}}>👤 <span style={{color:C.white}}>{meta.pilote}</span></span>}
          {meta.base && <span style={{color:C.muted}}>🛫 <span style={{color:C.white}}>{meta.base}</span></span>}
          {meta.periode && <span style={{color:C.muted}}>📅 <span style={{color:C.white}}>{meta.periode}</span></span>}
        </div>
      )}

      {/* Rotations */}
      {rotations.map((r,i)=>{
        const isCas2=r.cas===2||r.isCas2;
        const zc=isCas2?C.amber:C.blue;
        return (
          <div key={i} style={{
            background:C.bg, borderRadius:8, marginBottom:6,
            border:`1px solid ${isCas2?C.amber+"44":C.border}`,
            padding:"10px 12px", display:"flex", alignItems:"center", gap:10,
          }}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:C.white,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {r.trajet_resume}

// ─── COUCHE DE STOCKAGE RÉSILIENTE ───────────────────────────────
// Essaie dans l'ordre : window.storage (artefact Claude) → localStorage
// (navigateur / version OVH) → mémoire de session (dernier recours).
// Retourne aussi le backend utilisé pour l'afficher dans l'interface.
const memStore = {};
const Storage = {
  backend: null,
  async detect() {
    if (this.backend) return this.backend;
    // 1. window.storage (artefacts Claude)
    if (window.storage?.set) {
      try {
        await window.storage.set("__test__", "1");
        await window.storage.delete("__test__");
        this.backend = "claude"; return this.backend;
      } catch(e) {}
    }
    // 2. localStorage (site web classique)
    try {
      localStorage.setItem("__test__","1");
      localStorage.removeItem("__test__");
      this.backend = "local"; return this.backend;
    } catch(e) {}
    // 3. mémoire (perdu à la fermeture)
    this.backend = "memoire"; return this.backend;
  },
  async get(key) {
    const b = await this.detect();
    if (b==="claude") {
      const r = await window.storage.get(key);
      return r?.value ?? null;
    }
    if (b==="local") return localStorage.getItem("fr-pnt:"+key);
    return memStore[key] ?? null;
  },
  async set(key, value) {
    const b = await this.detect();
    if (b==="claude") { await window.storage.set(key, value); return; }
    if (b==="local") { localStorage.setItem("fr-pnt:"+key, value); return; }
    memStore[key] = value;
  },
  async remove(key) {
    const b = await this.detect();
    if (b==="claude") { try { await window.storage.delete(key); } catch(e){} return; }
    if (b==="local") { localStorage.removeItem("fr-pnt:"+key); return; }
    delete memStore[key];
  },
};

// ─── JUSTIFICATIFS : helpers ─────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

// Compression des photos (canvas) : max 1400 px, JPEG qualité 0,72.
// Une facture photographiée passe de ~4 Mo à ~250 ko, lisible à l'impression.
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1400;
        let { width, height } = img;
        if (width > MAX || height > MAX) {
          const k = MAX / Math.max(width, height);
          width = Math.round(width*k); height = Math.round(height*k);
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", 0.72));
      };
      img.onerror = () => reject(new Error("Image illisible"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("Lecture impossible"));
    reader.readAsDataURL(file);
  });
}

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = e => resolve(e.target.result);
    r.onerror = () => reject(new Error("Lecture impossible"));
    r.readAsDataURL(file);
  });
}

  {id:"courrier", label:"✈️ Frais en courrier (relevés APM, attestation)"},
  {id:"transport", label:"🚗 Transport (carte grise, péages, factures)"},
  {id:"repas", label:"🍽️ Repas (notes de restaurant)"},
  {id:"double_res", label:"🏠 Double résidence (bail, quittances)"},
  {id:"formation", label:"📚 Formation (factures stage, licence)"},
  {id:"bureau", label:"🖥️ Bureau (bail, factures EDF/internet)"},
  {id:"materiel", label:"💻 Matériel (factures d'achat)"},
  {id:"uniforme", label:"👨‍✈️ Uniforme (factures, pressing)"},
  {id:"cotis", label:"🏛️ Cotisations (attestations)"},
  {id:"medical", label:"🏥 Médical (facture CEMPN)"},
  {id:"juridique", label:"⚖️ Juridique (honoraires)"},
  {id:"mandat", label:"🤝 Mandat (justificatifs)"},
  {id:"autre", label:"📄 Autre"},
];

function App() {
  const [tab, setTab] = useState("saisie");
  const [openCat, setOpenCat] = useState("courrier");
  const [vals, setVals] = useState({});
  const [revenu, setRevenu] = useState("");
  // État frais en courrier
  const [rotations, setRotations] = useState([]);
  const [nuitees, setNuitees] = useState("");
  const [meta, setMeta] = useState(null);
  const [periodes, setPeriodes] = useState([]); // mois déjà chargés
  const [storageReady, setStorageReady] = useState(false);
  const [saveStatus, setSaveStatus] = useState("");
  const [backend, setBackend] = useState(null);
  const [showBackup, setShowBackup] = useState(false);
  const [justifs, setJustifs] = useState([]); // {id, catId, name, mime, data, date}
  const [printMode, setPrintMode] = useState(false);

  const applyData = useCallback((d) => {
    if (d.rotations) setRotations(d.rotations);
    if (d.nuitees !== undefined) setNuitees(d.nuitees);
    if (d.vals) setVals(d.vals);
    if (d.revenu !== undefined) setRevenu(d.revenu);
    if (d.meta) setMeta(d.meta);
    if (d.periodes) setPeriodes(d.periodes);
    if (d.justifs) setJustifs(d.justifs); // export complet : data incluse
  }, []);

  // ── CHARGEMENT au démarrage (persistance entre sessions) ──
  useEffect(() => {
    (async () => {
      const b = await Storage.detect();
      setBackend(b);
      try {
        const saved = await Storage.get("frais-reels-pnt");
        if (saved) {
          const d = JSON.parse(saved);
          applyData(d);
          // Justificatifs : index dans la clé principale, données par clé séparée
          if (d.justifsIndex?.length) {
            const loaded = [];
            for (const m of d.justifsIndex) {
              try {
                const data = await Storage.get("justif:"+m.id);
                if (data) loaded.push({ ...m, data });
              } catch(e) {}
            }
            setJustifs(loaded);
          }
        }
      } catch (e) { /* première utilisation */ }
      setStorageReady(true);
    })();
  }, [applyData]);

  // ── Ajout / suppression de justificatifs (données stockées par clé) ──
  const addJustif = useCallback(async (catId, file) => {
    const isImg = file.type.startsWith("image/");
    const isPdf = file.type === "application/pdf";
    if (!isImg && !isPdf) throw new Error("Format accepté : photo ou PDF");
    const data = isImg ? await compressImage(file) : await fileToDataURL(file);
    if (data.length > 2_500_000) {
      throw new Error("Fichier trop volumineux après compression (>2,5 Mo). Pour un PDF lourd, photographiez les pages.");
    }
    const j = { id: uid(), catId, name: file.name, mime: isImg?"image/jpeg":file.type,
                data, date: new Date().toISOString().slice(0,10) };
    await Storage.set("justif:"+j.id, data);
    setJustifs(prev => [...prev, j]);
  }, []);

  const removeJustif = useCallback(async (id) => {
    await Storage.remove("justif:"+id);
    setJustifs(prev => prev.filter(j => j.id !== id));
  }, []);

  // ── SAUVEGARDE automatique à chaque modification ──
  useEffect(() => {
    if (!storageReady) return; // ne pas écraser avant le chargement initial
    const timer = setTimeout(async () => {
      try {
        await Storage.set("frais-reels-pnt", JSON.stringify({
          rotations, nuitees, vals, revenu, meta, periodes,
          justifsIndex: justifs.map(({data, ...m}) => m), // index sans les données
          savedAt: new Date().toISOString(),
        }));
        setSaveStatus(backend==="memoire" ? "⚠️ Session seulement" : "💾 Sauvegardé");
        setTimeout(() => setSaveStatus(""), 2500);
      } catch (e) {
        setSaveStatus("⚠️ Échec sauvegarde");
      }
    }, 800); // debounce
    return () => clearTimeout(timer);
  }, [rotations, nuitees, vals, revenu, meta, periodes, justifs, storageReady, backend]);

  // Export / import de sauvegarde (transfert entre versions et appareils)
  const exportJSON = (withJustifs) => JSON.stringify({
    rotations, nuitees, vals, revenu, meta, periodes,
    ...(withJustifs ? { justifs } : {}),
    exportedAt: new Date().toISOString(), app: "FraisReelsPN",
  });
  const importJSON = async (txt) => {
    try {
      const d = JSON.parse(txt);
      if (!d.rotations && !d.vals && !d.justifs) throw new Error("format inattendu");
      applyData(d);
      // Réécrire les données des justificatifs dans leurs clés
      if (d.justifs?.length) {
        for (const j of d.justifs) {
          try { await Storage.set("justif:"+j.id, j.data); } catch(e) {}
        }
      }
      return true;
    } catch(e) { return false; }
  };

  const resetAll = async () => {
    for (const j of justifs) { try { await Storage.remove("justif:"+j.id); } catch(e){} }
    setRotations([]); setNuitees(""); setVals({});
    setRevenu(""); setMeta(null); setPeriodes([]); setJustifs([]);
    await Storage.remove("frais-reels-pnt");
  };

  const handleChange = useCallback((catId, fieldId, v) =>
    setVals(p=>({...p,[catId]:{...(p[catId]||{}),[fieldId]:v}})),[]);

  const totalCourrier = rotations.reduce((s,r)=>s+r.montant,0);
  const catTotals = CATEGORIES.map(c=>({...c, amount:computeCat(c, vals[c.id]||{})}));
  const totalAutres = catTotals.reduce((s,c)=>s+c.amount,0);
  const grandTotal = totalCourrier + totalAutres;
  // Nuitées : calcul automatique (tarif Transavia 2025, base ORY exclue),
  // remplacé par la saisie manuelle si le champ est renseigné
  const nuiteesAuto = rotations.reduce((s,r)=>s+(r.nuiteesMontant||0),0);
  const nuiteesEff = nuitees !== "" ? (parseFloat(nuitees)||0) : nuiteesAuto;
  // Sommes à AJOUTER au salaire ligne 1AJ (méthode mémento §1.8.2)
  const reintDetail = [
    {label:`Nuitées employeur ${nuitees===""?"(auto · tarif 2025)":"(saisie manuelle)"}`, amount: nuiteesEff},
    ...CATEGORIES.map(c=>({
      label: c.label,
      amount: computeReintSalaire(c, vals[c.id]||{}),
    })),
  ].filter(r=>r.amount>0);
  const totalReint = reintDetail.reduce((s,r)=>s+r.amount,0);

  // Abattement 10 % — revenus 2025 (déclaration 2026) : min 509 €, plafond 14 555 €
  // (identique pour tous les salariés, aucun plafond spécifique pilotes)
  const rev = parseFloat(revenu)||0;
  const abattement = rev>0 ? Math.min(Math.max(rev*0.1, Math.min(509, rev)), 14555) : 0;
  // Comparaison équitable : en frais réels les indemnités sont réintégrées au salaire,
  // alors qu'au forfait elles restent exonérées → avantage net = (frais − réintégration) − abattement
  const gain = (grandTotal - totalReint) - abattement;
  const nbRempli = (totalCourrier>0?1:0) + catTotals.filter(c=>c.amount>0).length;

  // ── MODE DOSSIER FISCAL IMPRIMABLE ──
  if (printMode) {
    return <DossierFiscal
      rotations={rotations} catTotals={catTotals}
      totalCourrier={totalCourrier} grandTotal={grandTotal}
      nuiteesEff={nuiteesEff} reintDetail={reintDetail} totalReint={totalReint}
      abattement={abattement} gain={gain} revenu={rev}
      meta={meta} periodes={periodes} justifs={justifs}
      onBack={()=>setPrintMode(false)}
    />;
  }

  return (
    <div style={{
      fontFamily:"'Inter',-apple-system,sans-serif",
      background:C.bg, minHeight:"100vh", color:C.white,
      maxWidth:480, margin:"0 auto",
    }}>
      {/* HEADER */}
      <div style={{
        background:`linear-gradient(135deg,${C.surface},${C.alt})`,
        borderBottom:`1px solid ${C.border}`, padding:"16px 16px 0",
        position:"sticky", top:0, zIndex:50,
      }}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
          <div>
            <div style={{fontSize:18,fontWeight:800,lineHeight:1.2}}>✈️ Frais Réels PN</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:2,minHeight:14}}>
              {backend && (
                <span style={{fontSize:9,color:backend==="memoire"?C.red:C.muted}}>
                  {backend==="claude"?"💾 Stockage Claude":backend==="local"?"💾 Stockage navigateur":"⚠️ Mémoire volatile"}
                </span>
              )}
              {saveStatus && <span style={{fontSize:9,color:C.green}}>{saveStatus}</span>}
              <button onClick={()=>setShowBackup(!showBackup)} style={{
                background:"none",border:"none",color:C.gold,
                fontSize:9,cursor:"pointer",padding:0,textDecoration:"underline",
              }}>🔐 Sauvegarde</button>
              {(rotations.length>0 || Object.keys(vals).length>0) && (
                <button onClick={()=>{
                  if (window.confirm("Effacer toutes les données sauvegardées (rotations, saisies) ?")) resetAll();
                }} style={{
                  background:"none",border:"none",color:C.muted,
                  fontSize:9,cursor:"pointer",padding:0,textDecoration:"underline",
                }}>🗑 Réinitialiser</button>
              )}
            </div>
          </div>
          <div style={{background:`${C.gold}18`,border:`1px solid ${C.gold}44`,
            borderRadius:10,padding:"7px 12px",textAlign:"right"}}>
            <div style={{fontSize:9,color:C.gold,textTransform:"uppercase",letterSpacing:1}}>Total</div>
            <div style={{fontSize:17,fontWeight:800,color:C.gold,fontFamily:"monospace"}}>{fmt(grandTotal)}</div>
          </div>
        </div>
        <div style={{display:"flex",marginTop:8}}>
          {[
            {id:"saisie",label:"Saisie"},
            {id:"synthese",label:"Synthèse"},
            {id:"legal",label:"Légal"},
          ].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1,padding:"10px 0",border:"none",cursor:"pointer",

              borderBottom:`2px solid ${tab===t.id?C.gold:"transparent"}`,
            }}>{t.label}</button>
          ))}
        </div>

      <div style={{padding:14}}>

            exportJSON={exportJSON}
            importJSON={importJSON}
            backend={backend}
            onClose={()=>setShowBackup(false)}
          />

// ─── PANNEAU SAUVEGARDE / RESTAURATION ───────────────────────────
function BackupPanel({ exportJSON, importJSON, backend, onClose }) {
  const [mode, setMode] = useState("export"); // export | import
  const [importTxt, setImportTxt] = useState("");
  const [msg, setMsg] = useState("");
  const [withJustifs, setWithJustifs] = useState(true);
  const taRef = useRef();
  const data = exportJSON(withJustifs);
  const sizeKo = Math.round(data.length/1024);

  // Copie fiable : Clipboard API → execCommand → sélection manuelle
  const copyToClipboard = async () => {
    try {
      await navigator.clipboard.writeText(data);
      setMsg("✅ Copié dans le presse-papiers !");
    } catch(e1) {
      try {
        const ta = taRef.current;
        ta.focus(); ta.select(); ta.setSelectionRange(0, data.length);
        const ok = document.execCommand("copy");
        setMsg(ok ? "✅ Copié !" : "Texte sélectionné — appuyez longuement → Copier.");
      } catch(e2) {
        taRef.current?.select();
        setMsg("Texte sélectionné — appuyez longuement → Copier.");
      }
    }
    setTimeout(()=>setMsg(""), 4000);
  };

  // Téléchargement en fichier .json
  const downloadFile = () => {
    try {
      const blob = new Blob([data], { type:"application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `frais-reels-pn-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
      setMsg("✅ Fichier téléchargé (voir Fichiers / Téléchargements).");
    } catch(e) {
      setMsg("⚠️ Téléchargement bloqué ici — utilisez la copie de texte.");
    }
    setTimeout(()=>setMsg(""), 4000);
  };

  // Import par fichier
  const fileRef = useRef();
  const onImportFile = async (f) => {
    if (!f) return;
    const txt = await f.text();
    setImportTxt(txt);
  };

  const doImport = async () => {
    const ok = await importJSON(importTxt.trim());
    if (ok) {
      setMsg("✅ Données restaurées !");
      setImportTxt("");
      setTimeout(()=>{ setMsg(""); onClose(); }, 1500);
    } else {
      setMsg("❌ Format invalide. Collez une sauvegarde exportée depuis cette application.");
    }
  };

  return (
    <div style={{
      background:C.surface, border:`1px solid ${C.gold}44`,
      borderRadius:12, padding:14, marginBottom:14,
    }}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:13,fontWeight:700,color:C.gold}}>🔐 Sauvegarde de vos données</span>
        <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,fontSize:16,cursor:"pointer"}}>×</button>
      </div>

      <div style={{fontSize:10,color:C.muted,lineHeight:1.5,marginBottom:10}}>
        {backend==="memoire"
          ? "⚠️ Le stockage automatique n'est pas disponible ici : exportez vos données avant de fermer !"
          : "Exportez pour transférer vers une autre version ou un autre appareil, ou simplement par sécurité avant la déclaration."}
      </div>

      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {[["export","📤 Exporter"],["import","📥 Restaurer"]].map(([m,label])=>(
          <button key={m} onClick={()=>{setMode(m);setMsg("")}} style={{
            flex:1, padding:"8px 0", borderRadius:8, cursor:"pointer",
            background:mode===m?C.gold:C.alt, color:mode===m?"#000":C.muted,
            border:"none", fontSize:11, fontWeight:mode===m?700:400,
          }}>{label}</button>
        ))}
      </div>

      {mode==="export" ? (
        <>
          <label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:C.muted,marginBottom:8,cursor:"pointer"}}>
            <input type="checkbox" checked={withJustifs} onChange={e=>setWithJustifs(e.target.checked)}/>
            Inclure les justificatifs (photos) — taille : {sizeKo} ko
          </label>
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            <button onClick={copyToClipboard} style={{
              flex:1, background:C.alt, border:`1px solid ${C.border}`,
              borderRadius:8, padding:"9px", color:C.white,
              fontSize:11, fontWeight:600, cursor:"pointer",
            }}>📋 Copier</button>
            <button onClick={downloadFile} style={{
              flex:1, background:C.gold, border:"none",
              borderRadius:8, padding:"9px", color:"#000",
              fontSize:11, fontWeight:700, cursor:"pointer",
            }}>💾 Télécharger .json</button>
          </div>
          <textarea ref={taRef} readOnly value={data} onClick={e=>e.target.select()} style={{
            width:"100%", boxSizing:"border-box", height:60,
            background:C.bg, border:`1px solid ${C.border}`, borderRadius:8,
            padding:8, color:C.muted, fontSize:9, fontFamily:"monospace", resize:"none",
          }}/>
          <div style={{fontSize:9,color:C.muted,marginTop:4,lineHeight:1.4}}>
            Le fichier .json est la méthode la plus sûre (Fichiers, iCloud, e-mail).
            La copie de texte convient pour les petites sauvegardes.
          </div>
        </>
      ) : (
        <>
          <input ref={fileRef} type="file" accept=".json,application/json"
            onChange={e=>onImportFile(e.target.files[0])} style={{display:"none"}}/>
          <button onClick={()=>fileRef.current?.click()} style={{
            width:"100%", background:C.alt, border:`1px solid ${C.border}`,
            borderRadius:8, padding:"9px", color:C.white,
            fontSize:11, fontWeight:600, cursor:"pointer", marginBottom:8,
          }}>📂 Choisir un fichier .json</button>
          <textarea placeholder="…ou collez ici votre sauvegarde" value={importTxt}
            onChange={e=>setImportTxt(e.target.value)} style={{
            width:"100%", boxSizing:"border-box", height:60,
            background:C.bg, border:`1px solid ${C.border}`, borderRadius:8,
            padding:8, color:C.white, fontSize:9, fontFamily:"monospace", resize:"none",
          }}/>
          <button onClick={doImport} disabled={!importTxt.trim()} style={{
            width:"100%", marginTop:8,
            background:importTxt.trim()?C.gold:C.border,
            color:importTxt.trim()?"#000":C.muted,
            border:"none", borderRadius:8, padding:"9px",
            fontSize:11, fontWeight:700, cursor:importTxt.trim()?"pointer":"default",
          }}>Restaurer ces données</button>
        </>
      )}

      {msg && <div style={{fontSize:10,color:msg.startsWith("✅")?C.green:C.amber,marginTop:6}}>{msg}</div>}
    </div>
  );
}

// ─── CARTE JUSTIFICATIFS (archivage photos / PDF) ────────────────
function JustifCard({ justifs, addJustif, removeJustif, isOpen, onToggle, backend }) {
  const [catSel, setCatSel] = useState("courrier");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [viewer, setViewer] = useState(null); // justif en plein écran
  const fileRef = useRef();

  const totalSize = justifs.reduce((s,j)=>s+(j.data?.length||0),0);
  const sizeMB = (totalSize/1024/1024).toFixed(1);

  const onFiles = async (files) => {
    setBusy(true); setErr("");
    for (const f of files) {
      try { await addJustif(catSel, f); }
      catch(e) { setErr(e.message); }
    }
    setBusy(false);
  };

  const byCat = {};
  justifs.forEach(j=>{ (byCat[j.catId]=byCat[j.catId]||[]).push(j); });

  return (
    <div style={{
      background:C.surface, borderRadius:12, marginBottom:8, overflow:"hidden",
      border:`1px solid ${isOpen?C.gold:C.border}`,
    }}>
      <div onClick={onToggle} style={{
        display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"13px 16px",cursor:"pointer",
        background:isOpen?`${C.gold}0E`:"transparent",
      }}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>📎</span>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:C.white}}>Justificatifs archivés</div>
            {justifs.length>0 && (
              <div style={{fontSize:11,color:C.gold,fontWeight:700}}>
                {justifs.length} pièce{justifs.length>1?"s":""} · {sizeMB} Mo
              </div>
            )}
          </div>
        </div>
        <span style={{color:C.muted,fontSize:16,transform:isOpen?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▾</span>
      </div>

      {isOpen && (
        <div style={{padding:"0 16px 16px"}}>
          <p style={{fontSize:11,color:C.muted,lineHeight:1.5,margin:"0 0 12px",
            borderTop:`1px solid ${C.border}`,paddingTop:12}}>
            Photographiez vos factures et notes au fil de l'année : tout est archivé
            ici (compressé) et intégré au dossier fiscal imprimable. Conservez les
            originaux 3 ans.
          </p>

          {/* Sélecteur de rubrique + ajout */}
          <select value={catSel} onChange={e=>setCatSel(e.target.value)} style={{
            width:"100%", boxSizing:"border-box", background:C.alt,
            border:`1px solid ${C.border}`, borderRadius:8,
            padding:"9px 12px", color:C.white, fontSize:12, marginBottom:8,
          }}>
            {JUSTIF_CATS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
          </select>

          <input ref={fileRef} type="file" accept="image/*,application/pdf" multiple
            onChange={e=>{onFiles([...e.target.files]); e.target.value="";}}
            style={{display:"none"}}/>
          <button onClick={()=>fileRef.current?.click()} disabled={busy} style={{
            width:"100%", background:C.gold, color:"#000", border:"none",
            borderRadius:8, padding:"11px", fontSize:12, fontWeight:700,
            cursor:busy?"default":"pointer", opacity:busy?0.6:1,
          }}>
            {busy ? "⏳ Compression…" : "📷 Photographier / ajouter un justificatif"}
          </button>
          {err && <div style={{fontSize:10,color:C.red,marginTop:6}}>❌ {err}</div>}
          {backend==="claude" && sizeMB>3.5 && (
            <div style={{fontSize:9,color:C.amber,marginTop:6,lineHeight:1.4}}>
              ⚠️ Archive volumineuse ({sizeMB} Mo) : pensez à exporter régulièrement
              (🔐 Sauvegarde) pour ne rien perdre.
            </div>
          )}

          {/* Liste par rubrique */}
          {Object.entries(byCat).map(([catId, items])=>{
            const cat = JUSTIF_CATS.find(c=>c.id===catId);
            return (
              <div key={catId} style={{marginTop:12}}>
                <div style={{fontSize:10,color:C.muted,fontWeight:600,
                  textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>
                  {cat?.label||catId}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                  {items.map(j=>(
                    <div key={j.id} style={{position:"relative"}}>
                      <div onClick={()=>setViewer(j)} style={{
                        height:70, borderRadius:8, overflow:"hidden",
                        background:C.alt, border:`1px solid ${C.border}`,
                        cursor:"pointer", display:"flex",
                        alignItems:"center", justifyContent:"center",
                      }}>
                        {j.mime.startsWith("image/")
                          ? <img src={j.data} alt={j.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                          : <span style={{fontSize:24}}>📄</span>}
                      </div>
                      <button onClick={()=>removeJustif(j.id)} style={{
                        position:"absolute", top:-5, right:-5,
                        width:18, height:18, borderRadius:"50%",
                        background:C.red, color:"#fff", border:"none",
                        fontSize:11, lineHeight:"18px", cursor:"pointer", padding:0,
                      }}>×</button>
                      <div style={{fontSize:8,color:C.muted,marginTop:2,
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {j.date} {j.name}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}

          {/* Visionneuse plein écran */}
          {viewer && (
            <div onClick={()=>setViewer(null)} style={{
              position:"fixed", inset:0, zIndex:200,
              background:"rgba(0,0,0,0.92)",
              display:"flex", flexDirection:"column",
              alignItems:"center", justifyContent:"center", padding:16,
            }}>
              {viewer.mime.startsWith("image/")
                ? <img src={viewer.data} alt={viewer.name}
                    style={{maxWidth:"100%",maxHeight:"80vh",borderRadius:8}}/>
                : <iframe src={viewer.data} title={viewer.name}
                    style={{width:"100%",height:"80vh",border:"none",borderRadius:8,background:"#fff"}}/>}
              <div style={{color:C.white,fontSize:12,marginTop:10}}>{viewer.name} — toucher pour fermer</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── DOSSIER FISCAL IMPRIMABLE ───────────────────────────────────
function DossierFiscal(props) {
  const { rotations, catTotals, totalCourrier, grandTotal, nuiteesEff,
          reintDetail, totalReint, abattement, gain, revenu,
          meta, periodes, justifs, onBack } = props;
  const annee = meta?.periode?.match(/\d{4}/)?.[0] || new Date().getFullYear();
  const euro = n => new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR"}).format(n||0);

  return (
    <div style={{background:"#fff",color:"#111",minHeight:"100vh",
      fontFamily:"Georgia,'Times New Roman',serif"}}>
      <style>{`
        @media print {
          .no-print { display:none !important; }
          .page-break { page-break-before:always; }
          body { background:#fff; }
        }
        .dossier table { width:100%; border-collapse:collapse; font-size:12px; }
        .dossier th, .dossier td { border:1px solid #999; padding:5px 8px; text-align:left; }
        .dossier th { background:#eee; }
      `}</style>

      {/* Barre d'actions (masquée à l'impression) */}
      <div className="no-print" style={{
        position:"sticky", top:0, background:"#1a1a2e", padding:"12px 16px",
        display:"flex", gap:10, zIndex:10,
      }}>
        <button onClick={onBack} style={{
          background:"none", border:"1px solid #888", color:"#fff",
          borderRadius:8, padding:"8px 16px", fontSize:13, cursor:"pointer",
        }}>← Retour</button>
        <button onClick={()=>window.print()} style={{
          flex:1, background:"#D4A017", border:"none", color:"#000",
          borderRadius:8, padding:"8px 16px", fontSize:13, fontWeight:700, cursor:"pointer",
        }}>🖨️ Imprimer / Enregistrer en PDF</button>
      </div>

      <div className="dossier" style={{maxWidth:760, margin:"0 auto", padding:"30px 24px"}}>
        {/* En-tête */}
        <div style={{textAlign:"center", borderBottom:"3px double #333", paddingBottom:16, marginBottom:20}}>
          <div style={{fontSize:22, fontWeight:700}}>DOSSIER FRAIS RÉELS — PERSONNEL NAVIGANT</div>
          <div style={{fontSize:13, marginTop:6}}>
            Déclaration des revenus {annee} · Option frais réels (art. 83-3° CGI)
          </div>
          {meta?.pilote && <div style={{fontSize:13, marginTop:4}}><strong>{meta.pilote}</strong>{meta.base?` — Base ${meta.base}`:""}</div>}
          <div style={{fontSize:11, color:"#555", marginTop:4}}>
            Établi le {new Date().toLocaleDateString("fr-FR")} ·
            Relevés intégrés : {periodes.length>0?periodes.join(", "):"—"}
          </div>
        </div>

        {/* 1. Synthèse générale */}
        <h2 style={{fontSize:16, borderBottom:"1px solid #333", paddingBottom:4}}>1. Synthèse des frais déductibles (case 1AK)</h2>
        <table>
          <thead><tr><th>Rubrique</th><th style={{textAlign:"right"}}>Montant</th></tr></thead>
          <tbody>
            {totalCourrier>0 && <tr><td>Frais en courrier — dispositif PNT (lettre DLF 15/02/1999)</td>
              <td style={{textAlign:"right"}}>{euro(totalCourrier)}</td></tr>}
            {catTotals.filter(c=>c.amount>0).map(c=>(
              <tr key={c.id}><td>{c.label}</td><td style={{textAlign:"right"}}>{euro(c.amount)}</td></tr>
            ))}
            <tr style={{fontWeight:700, background:"#f5f5f5"}}>
              <td>TOTAL FRAIS RÉELS DÉDUCTIBLES (à reporter case 1AK)</td>
              <td style={{textAlign:"right"}}>{euro(grandTotal)}</td>
            </tr>
          </tbody>
        </table>

        {/* 2. Réintégration */}
        {totalReint>0 && <>
          <h2 style={{fontSize:16, borderBottom:"1px solid #333", paddingBottom:4, marginTop:24}}>
            2. Sommes réintégrées au salaire (ajoutées ligne 1AJ)
          </h2>
          <table>
            <tbody>
              {reintDetail.map((r,i)=>(
                <tr key={i}><td>{r.label}</td><td style={{textAlign:"right"}}>{euro(r.amount)}</td></tr>
              ))}
              <tr style={{fontWeight:700, background:"#f5f5f5"}}>
                <td>TOTAL AJOUTÉ AU SALAIRE DÉCLARÉ</td>
                <td style={{textAlign:"right"}}>{euro(totalReint)}</td>
              </tr>
            </tbody>
          </table>
        </>}

        {/* 3. Détail des rotations */}
        {rotations.length>0 && <>
          <h2 style={{fontSize:16, borderBottom:"1px solid #333", paddingBottom:4, marginTop:24}}>
            3. Détail des rotations — frais en courrier
          </h2>
          <p style={{fontSize:11, color:"#444"}}>
            Méthode : lettre DLF du 15/02/1999. Cas 1 (pays liste §1a) : (X jours − 0,5)
            indemnités au tarif du pays de découcher. Cas 2 (hors liste, arrêt ≥7h) :
            X indemnités. Nuitées réglées par l'employeur réintégrées au salaire
            (tarif Transavia {annee}).
          </p>
          <table>
            <thead><tr>
              <th>Mois</th><th>Jours</th><th>Rotation</th><th>Cas</th>
              <th>Ind.</th><th>Taux</th><th style={{textAlign:"right"}}>Déduction</th>
              <th style={{textAlign:"right"}}>Nuitées empl.</th>
            </tr></thead>
            <tbody>
              {rotations.map((r,i)=>(
                <tr key={i}>
                  <td>{r.periode?.split(" ")[0]||"—"}</td>
                  <td>{String(r.premier_jour).padStart(2,"0")}→{String(r.dernier_jour).padStart(2,"0")}</td>
                  <td style={{fontSize:10}}>{r.trajet_resume}</td>
                  <td>C{r.cas===2||r.isCas2?"2":"1"}</td>
                  <td>{r.nb_indemnites}</td>
                  <td>{r.taux} €</td>
                  <td style={{textAlign:"right"}}>{euro(r.montant)}</td>
                  <td style={{textAlign:"right"}}>{euro(r.nuiteesMontant||0)}</td>
                </tr>
              ))}
              <tr style={{fontWeight:700, background:"#f5f5f5"}}>
                <td colSpan={6}>TOTAUX</td>
                <td style={{textAlign:"right"}}>{euro(totalCourrier)}</td>
                <td style={{textAlign:"right"}}>{euro(nuiteesEff)}</td>
              </tr>
            </tbody>
          </table>
        </>}

        {/* 4. Comparaison */}
        {revenu>0 && <>
          <h2 style={{fontSize:16, borderBottom:"1px solid #333", paddingBottom:4, marginTop:24}}>
            4. Comparaison avec l'abattement forfaitaire
          </h2>
          <table>
            <tbody>
              <tr><td>Revenu brut déclaré</td><td style={{textAlign:"right"}}>{euro(revenu)}</td></tr>
              <tr><td>Abattement forfaitaire 10 % (plafonné)</td><td style={{textAlign:"right"}}>{euro(abattement)}</td></tr>
              <tr><td>Frais réels nets (déduction − réintégration)</td><td style={{textAlign:"right"}}>{euro(grandTotal-totalReint)}</td></tr>
              <tr style={{fontWeight:700, background:"#f5f5f5"}}>
                <td>{gain>0?"AVANTAGE NET OPTION FRAIS RÉELS":"AVANTAGE FORFAIT (option non retenue)"}</td>
                <td style={{textAlign:"right"}}>{euro(Math.abs(gain))}</td>
              </tr>
            </tbody>
          </table>
        </>}

        {/* 5. Justificatifs */}
        {justifs.length>0 && <>
          <div className="page-break"/>
          <h2 style={{fontSize:16, borderBottom:"1px solid #333", paddingBottom:4, marginTop:24}}>
            5. Pièces justificatives ({justifs.length})
          </h2>
          {JUSTIF_CATS.map(cat=>{
            const items = justifs.filter(j=>j.catId===cat.id);
            if (!items.length) return null;
            return (
              <div key={cat.id} style={{marginTop:16}}>
                <h3 style={{fontSize:13}}>{cat.label}</h3>
                {items.map(j=>(
                  <div key={j.id} style={{marginBottom:14, pageBreakInside:"avoid"}}>
                    <div style={{fontSize:10, color:"#555", marginBottom:4}}>
                      {j.date} — {j.name}
                    </div>
                    {j.mime.startsWith("image/")
                      ? <img src={j.data} alt={j.name}
                          style={{maxWidth:"100%", maxHeight:600, border:"1px solid #ccc"}}/>
                      : <div style={{border:"1px dashed #999", padding:10, fontSize:11, color:"#666"}}>
                          📄 Document PDF joint : « {j.name} » — à imprimer séparément
                          depuis l'application (toucher la vignette puis imprimer).
                        </div>}
                  </div>
                ))}
              </div>
            );
          })}
        </>}

        {/* Pied de page */}
        <div style={{marginTop:30, paddingTop:12, borderTop:"1px solid #999",
          fontSize:10, color:"#555", lineHeight:1.6}}>
          Références : lettre DLF n°99002172 du 15 février 1999 et son Annexe ·
          BOI-RSA-BASE-30-50-30-20 · BOI-RSA-BASE-30-50-30-40 · Art. 83-3° CGI.
          Document établi avec l'application Frais Réels PN d'après le Mémento Fiscal
          SNPL France ALPA. Le contribuable demeure seul responsable de sa déclaration.
          Justificatifs originaux conservés {Number(annee)+3 ? `jusqu'en ${Number(annee)+4}` : "3 ans"}.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
